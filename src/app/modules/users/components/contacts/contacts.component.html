<nav>
    <ul>
        <li *ngFor="let contact of contacts$ | async">
        <a [routerLink]="['/users/profile', contact.id]">
            {{ contact.username }}
        </a>

        <button
            type="button"
            class="contact-chat-btn"
            (click)="openChat(contact); $event.stopPropagation(); $event.preventDefault()"
            [attr.aria-label]="'Chatear con ' + contact.username"
            title="Chatear"
        >
            💬
        </button>
        </li>
    </ul>
</nav>
