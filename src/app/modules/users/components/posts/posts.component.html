<ng-container *ngIf="posts.length; else emptyFeed">

    <article
    class="post-card"
    *ngFor="let post of posts; trackBy: trackByPostId"
    >
        <header class="post-header">

            <div class="post-author" *ngIf="getUser(post) as author">

            <img
                class="avatar"
                [src]="author.image"
                [alt]="author.username"
            />

            <div class="author-info">
                <span class="username">
                {{ author.username }}
                </span>

                <span class="post-date">
                {{ post.createdAt | date:'mediumDate'}}
                </span>
            </div>

            </div>

        </header>

        <p class="post-content">
            {{ post.content }}
        </p>

        <footer class="post-footer">
            ❤️ {{ post.likes }}
        </footer>
    </article>

</ng-container>

<ng-template #emptyFeed>
    <p class="empty-feed">No hay publicaciones aún.</p>
</ng-template>
